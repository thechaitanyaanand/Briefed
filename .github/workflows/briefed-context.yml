name: Briefed Context Update

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  briefed-context:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Set ORIG_HEAD manually
        run: git update-ref ORIG_HEAD $(git rev-parse HEAD~1)

      - name: Run briefed
        run: npx briefed run
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Check and commit context changes
        run: |
          if ! git diff --quiet CLAUDE.md; then
            git config --local user.name "github-actions[bot]"
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git add CLAUDE.md
            git commit -m "chore: update AI context [skip ci]"
            git push
          fi
